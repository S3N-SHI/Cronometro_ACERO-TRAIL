<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { background: #0A0A0A; min-height: 100vh; font-family: 'Barlow Condensed', 'Barlow', sans-serif; }
.app-inner { padding: 0 16px 32px; }

.hero-header {
  background: #0A0A0A;
  border-bottom: 2px solid #CC0000;
  padding: 20px 16px 16px;
  margin-bottom: 14px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.hero-brand { display: flex; flex-direction: column; gap: 0; }
.hero-line1 { font-family: 'Bebas Neue', 'Barlow Condensed', sans-serif; font-size: 42px; font-weight: 900; letter-spacing: 6px; color: #fff; line-height: 1; }
.hero-line2 { font-family: 'Bebas Neue', 'Barlow Condensed', sans-serif; font-size: 42px; font-weight: 900; letter-spacing: 6px; color: #CC0000; line-height: 1; }
.hero-line3 { font-family: 'Bebas Neue', 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 400; letter-spacing: 8px; color: #2A2A2A; line-height: 1; }
.hero-sub { font-size: 9px; color: #444; letter-spacing: 4px; text-transform: uppercase; margin-top: 6px; }
.hero-meta { text-align: right; }
.hero-date { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #CC0000; letter-spacing: 3px; }
.hero-place { font-size: 10px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

.master-clock {
  background: #111; border: 1px solid #CC0000; border-radius: 10px;
  padding: 18px 22px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.master-label { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 4px; }
.master-time { font-size: 60px; font-weight: 700; letter-spacing: 5px; color: #fff; font-variant-numeric: tabular-nums; transition: color 0.3s; line-height: 1; }
.master-time.running { color: #CC0000; }
.master-btns { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

button {
  border: 1px solid #2A2A2A; background: #161616; color: #888;
  border-radius: 5px; padding: 8px 16px; font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
button:hover { background: #1E1E1E; color: #fff; border-color: #444; }
button:active { transform: scale(0.97); }
button.btn-go { background: #CC0000; color: #fff; border-color: #CC0000; }
button.btn-go:hover { background: #FF0000; }
button.btn-stop { background: #2A0000; color: #CC0000; border-color: #8B0000; }
button.btn-stop:hover { background: #3A0000; color: #FF0000; }
button.btn-ghost { padding: 7px 12px; font-size: 10px; }
button:disabled { opacity: 0.25; cursor: default; transform: none; }

.tab-bar {
  display: flex; gap: 4px; margin-bottom: 14px;
  border-bottom: 1px solid #1A1A1A; padding-bottom: 0;
}
.tab-btn {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: #444; padding: 10px 18px; font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  border-radius: 0; transition: all 0.15s; margin-bottom: -1px;
}
.tab-btn:hover { color: #888; background: none; }
.tab-btn.active { color: #fff; border-bottom-color: #CC0000; background: none; }

.load-section {
  background: #111; border: 1px solid #1E1E1E; border-radius: 8px;
  padding: 12px 16px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.load-section input[type=text] {
  flex: 1; min-width: 180px; padding: 7px 10px;
  border: 1px solid #222; border-radius: 5px;
  background: #0A0A0A; color: #fff; font-size: 11px; outline: none;
}
.load-section input:focus { border-color: #CC0000; }
.load-status { font-size: 10px; color: #444; }
.load-status.ok { color: #2ecc71; }
.load-status.err { color: #CC0000; }

.stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px,1fr)); gap: 7px; margin-bottom: 12px; }
.stat-card { background: #111; border: 1px solid #1A1A1A; border-radius: 7px; padding: 9px 11px; }
.stat-label { font-size: 8px; color: #444; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
.stat-val { font-size: 24px; font-weight: 700; color: #fff; line-height: 1; }

.section-title {
  font-size: 8px; color: #444; text-transform: uppercase; letter-spacing: 3px;
  margin-bottom: 7px; margin-top: 12px;
  border-left: 2px solid #CC0000; padding-left: 8px;
}

.filters { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
.filter-btn {
  border-radius: 20px; padding: 4px 12px; font-size: 10px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  white-space: nowrap; border: 1px solid #252525; background: #111; color: #444;
}
.filter-btn:hover { color: #ccc; border-color: #444; background: #111; }

.search-wrap { margin-top: 10px; margin-bottom: 14px; }
.search-box {
  width: 100%; padding: 9px 14px; border: 1px solid #222; border-radius: 6px;
  background: #111; color: #fff; font-size: 13px; outline: none; letter-spacing: 0.5px;
}
.search-box:focus { border-color: #CC0000; }
.search-box::placeholder { color: #2A2A2A; }

.runners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 10px; }

.runner-card {
  border-radius: 10px; border: 1px solid; overflow: hidden; transition: border-color 0.2s;
}
.card-header { padding: 12px 16px 10px; }
.card-body { background: #0D0D0D; padding: 14px 16px; }

.runner-id { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 5px; }
.runner-name { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.5px; line-height: 1.1; margin-bottom: 3px; }
.runner-cat { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.runner-meta { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }

.runner-time {
  font-size: 46px; font-weight: 700; letter-spacing: 3px;
  font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 10px; color: #fff;
}
.runner-time.finished { color: #2ecc71; }
.runner-time.pending { color: #252525; }

.finish-mark { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #2ecc71; margin-bottom: 10px; }

.runner-actions { display: flex; gap: 6px; }
.runner-actions button { flex: 1; font-size: 10px; padding: 7px 8px; }

.dist-badge {
  font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: 1.5px; border: 1px solid; white-space: nowrap;
}

.running-dot {
  display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  background: #CC0000; margin-right: 5px; vertical-align: middle;
  animation: blink 0.9s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: 5px; }
.empty-msg { grid-column:1/-1; text-align:center; padding:60px; color:#252525; font-size:13px; letter-spacing:2px; text-transform:uppercase; }

.podium-section { margin-top: 4px; }
.podium-group { margin-bottom: 24px; }
.podium-group-title {
  font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 3px;
  border-left: 2px solid #CC0000; padding-left: 8px; margin-bottom: 10px;
}
.podium-table { width: 100%; border-collapse: collapse; }
.podium-table th {
  font-size: 8px; color: #333; text-transform: uppercase; letter-spacing: 2px;
  padding: 6px 10px; text-align: left; border-bottom: 1px solid #1A1A1A; font-weight: 700;
}
.podium-table td { padding: 9px 10px; border-bottom: 1px solid #141414; vertical-align: middle; }
.pos-num {
  font-size: 18px; font-weight: 700; width: 36px; text-align: center;
  font-variant-numeric: tabular-nums;
}
.pos-1 { color: #FFD700; }
.pos-2 { color: #C0C0C0; }
.pos-3 { color: #CD7F32; }
.pos-rest { color: #333; font-size: 14px; }
.pod-name { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
.pod-cat { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.pod-time { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; color: #fff; letter-spacing: 1px; }
.pod-time.best { color: #2ecc71; }
.pod-id { font-size: 9px; color: #333; letter-spacing: 1px; }
.podium-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
.podium-empty { text-align: center; padding: 40px; color: #252525; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
.pod-row-top { background: rgba(255,255,255,0.015); }
.cat-stripe { display: inline-block; width: 3px; height: 16px; border-radius: 2px; vertical-align: middle; margin-right: 6px; }
</style>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<div class="app">

  <div class="hero-header">
    <div class="hero-brand">
      <div class="hero-line1">ACERO</div>
      <div class="hero-line2">TRAIL</div>
      <div class="hero-line3">RUNNING</div>
      <div class="hero-sub">San Mateo · Manabi · Ecuador</div>
    </div>
    <div class="hero-meta">
      <div class="hero-date">25 · ABR · 2026</div>
      <div class="hero-place">Cronometro Oficial</div>
      <div style="margin-top:10px;text-align:right">
        <div id="s-running" style="font-size:11px;color:#555;letter-spacing:1px">— en carrera</div>
        <div id="s-finished" style="font-size:11px;color:#2ecc71;letter-spacing:1px">— finalizados</div>
      </div>
    </div>
  </div>

  <div class="app-inner">

    <div class="load-section">
      <div style="flex:1;min-width:160px">
        <div class="load-status" id="load-status">Demo activo — pega tu URL de Apps Script para cargar corredores reales</div>
      </div>
      <input type="text" id="script-url" placeholder="https://script.google.com/macros/s/.../exec">
      <button onclick="loadFromSheet()" class="btn-ghost" style="color:#CC0000;border-color:#8B0000">Cargar corredores</button>
    </div>

    <div class="master-clock">
      <div style="flex:1;min-width:200px">
        <div class="master-label">Cronometro general</div>
        <div class="master-time" id="master-display">00:00:00</div>
      </div>
      <div class="master-btns">
        <button class="btn-go" id="btn-start" onclick="masterStart()">Iniciar largada</button>
        <button id="btn-pause" onclick="masterPause()" style="display:none">Pausar</button>
        <button class="btn-stop" id="btn-reset" onclick="masterReset()">Reiniciar</button>
        <button class="btn-ghost" onclick="finishAll()">Finalizar todos</button>
      </div>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="setTab('cronometro',this)">Cronometro</button>
      <button class="tab-btn" onclick="setTab('clasificacion',this)">Clasificacion</button>
    </div>

    <div id="tab-cronometro">
      <div class="section-title">Categoria</div>
      <div class="filters" id="cat-filters"></div>

      <div class="section-title">Distancia</div>
      <div class="filters" id="dist-filters"></div>

      <div class="search-wrap">
        <input class="search-box" id="search" placeholder="Buscar por nombre o ID..." oninput="renderCards()">
      </div>

      <div class="runners-grid" id="runners-grid"></div>
    </div>

    <div id="tab-clasificacion" style="display:none">
      <div class="section-title">Filtrar clasificacion</div>
      <div class="podium-filters">
        <button class="filter-btn" style="background:#1A1A1A;color:#fff;border-color:#444" onclick="setPodFilter('dist','all',this)">Todas las distancias</button>
        <button class="filter-btn" id="pf-2k" onclick="setPodFilter('dist','2K',this)" style="border-color:#1D9E75;color:#9FE1CB">2K</button>
        <button class="filter-btn" id="pf-6k" onclick="setPodFilter('dist','6K',this)" style="border-color:#1565C0;color:#90CAF9">6K</button>
        <button class="filter-btn" id="pf-11k" onclick="setPodFilter('dist','11K',this)" style="border-color:#CC0000;color:#F7C1C1">11K</button>
      </div>
      <div class="podium-filters" id="pod-cat-filters"></div>
      <div class="podium-section" id="podium-section"></div>
    </div>

  </div>
</div>

<script>
const CATS = {
  'Full Body':    { bg:'#5C1525', border:'#993556', accent:'#F4C0D1', time:'#F4C0D1' },
  'Kids':         { bg:'#0B3A28', border:'#1D9E75', accent:'#9FE1CB', time:'#9FE1CB' },
  'Juvenil':      { bg:'#001A4A', border:'#1565C0', accent:'#90CAF9', time:'#90CAF9' },
  'Senior':       { bg:'#3D2E00', border:'#D4AC00', accent:'#FFE566', time:'#FFE566' },
  'Sénior':       { bg:'#3D2E00', border:'#D4AC00', accent:'#FFE566', time:'#FFE566' },
  'Master':       { bg:'#1C0A3A', border:'#7B2FBE', accent:'#C77DFF', time:'#C77DFF' },
  'Máster':       { bg:'#1C0A3A', border:'#7B2FBE', accent:'#C77DFF', time:'#C77DFF' },
  'Comandante':   { bg:'#0F2206', border:'#3B6D11', accent:'#C0DD97', time:'#C0DD97' },
  'Gran Maestro': { bg:'#1A1A18', border:'#6B6B68', accent:'#C8C6C0', time:'#C8C6C0' },
};

const DISTS = {
  '2K':  { color:'#1D9E75', border:'#085041', text:'#9FE1CB' },
  '6K':  { color:'#1565C0', border:'#0D3B7A', text:'#90CAF9' },
  '11K': { color:'#CC0000', border:'#8B0000', text:'#F7C1C1' },
};

const DEMO = [
  { id:'ATR-0001', nombres:'Carlos',    apellidos:'Vera',      genero:'M', distancia:'11K', categoria:'Sénior' },
  { id:'ATR-0002', nombres:'María',     apellidos:'Loor',      genero:'F', distancia:'6K',  categoria:'Máster' },
  { id:'ATR-0003', nombres:'Andrés',    apellidos:'Moreira',   genero:'M', distancia:'11K', categoria:'Gran Maestro' },
  { id:'ATR-0004', nombres:'Lucía',     apellidos:'Ponce',     genero:'F', distancia:'6K',  categoria:'Juvenil' },
  { id:'ATR-0005', nombres:'Fernanda',  apellidos:'Ríos',      genero:'F', distancia:'11K', categoria:'Full Body' },
  { id:'ATR-0006', nombres:'Diego',     apellidos:'Zambrano',  genero:'M', distancia:'11K', categoria:'Full Body' },
  { id:'ATR-0007', nombres:'Sofía',     apellidos:'Almeida',   genero:'F', distancia:'6K',  categoria:'Sénior' },
  { id:'ATR-0008', nombres:'Roberto',   apellidos:'Chica',     genero:'M', distancia:'11K', categoria:'Comandante' },
  { id:'ATR-0009', nombres:'Tomás',     apellidos:'Cevallos',  genero:'M', distancia:'2K',  categoria:'Kids' },
  { id:'ATR-0010', nombres:'Isabella',  apellidos:'Muñoz',     genero:'F', distancia:'2K',  categoria:'Kids' },
  { id:'ATR-0011', nombres:'Ana',       apellidos:'Cedeño',    genero:'F', distancia:'11K', categoria:'Gran Maestro' },
  { id:'ATR-0012', nombres:'Martín',    apellidos:'Baque',     genero:'M', distancia:'6K',  categoria:'Máster' },
  { id:'ATR-0013', nombres:'Valentina', apellidos:'Loza',      genero:'F', distancia:'6K',  categoria:'Juvenil' },
  { id:'ATR-0014', nombres:'Emilio',    apellidos:'Vera',      genero:'M', distancia:'11K', categoria:'Comandante' },
  { id:'ATR-0015', nombres:'Sara',      apellidos:'Pin',       genero:'F', distancia:'2K',  categoria:'Kids' },
];

let masterRunning=false, masterInterval=null, masterMs=0, masterOffset=0, masterStartTs=null;
let catFilter='all', distFilter='all', runners=[];
let podDistFilter='all', podCatFilter='all';
let activeTab='cronometro';

function normalizar(r) {
  const m={'master':'Máster','máster':'Máster','senior':'Sénior','sénior':'Sénior',
    'juvenil':'Juvenil','comandante':'Comandante','gran maestro':'Gran Maestro',
    'kids':'Kids','full body':'Full Body'};
  r.categoria = m[(r.categoria||'').toLowerCase().trim()] || r.categoria;
  r.distancia = (r.distancia||'').trim().toUpperCase();
  return r;
}
function initRunners(raw) {
  runners = raw.map(r=>({...normalizar(r),elapsed:0,running:false,finished:false,finishTime:null,finishMs:0,startTs:null,offset:0}));
}
initRunners(DEMO);

function fmt(ms) {
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

async function loadFromSheet() {
  const url=document.getElementById('script-url').value.trim();
  if(!url){setStatus('Ingresa la URL primero.','err');return;}
  setStatus('Cargando...','');
  try {
    const resp=await fetch(url+'?action=getCorredores');
    const data=await resp.json();
    if(data.status!=='ok'||!data.corredores) throw new Error('Respuesta invalida');
    initRunners(data.corredores);
    setStatus(`Cargados ${runners.length} corredores`,'ok');
    renderAll();
  } catch(err){setStatus('Error: '+err.message,'err');}
}
function setStatus(msg,cls){const el=document.getElementById('load-status');el.textContent=msg;el.className='load-status '+(cls||'');}

function setTab(tab,btn) {
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('tab-cronometro').style.display   = tab==='cronometro'     ? '' : 'none';
  document.getElementById('tab-clasificacion').style.display = tab==='clasificacion' ? '' : 'none';
  if(tab==='clasificacion') renderPodium();
}

function masterStart() {
  if(masterRunning)return;
  masterRunning=true;masterStartTs=Date.now()-masterOffset;
  masterInterval=setInterval(tick,200);
  runners.forEach(r=>{if(!r.finished){r.running=true;r.startTs=Date.now()-r.offset;}});
  document.getElementById('btn-start').style.display='none';
  document.getElementById('btn-pause').style.display='';
  document.getElementById('master-display').className='master-time running';
  renderCards();
}
function masterPause() {
  if(!masterRunning)return;
  masterRunning=false;clearInterval(masterInterval);masterOffset=masterMs;
  runners.forEach(r=>{if(r.running){r.offset=Date.now()-r.startTs;r.running=false;}});
  document.getElementById('btn-start').style.display='';
  document.getElementById('btn-start').textContent='Reanudar';
  document.getElementById('btn-pause').style.display='none';
  document.getElementById('master-display').className='master-time';
}
function masterReset() {
  clearInterval(masterInterval);masterRunning=false;masterMs=0;masterOffset=0;
  runners.forEach(r=>{r.elapsed=0;r.running=false;r.finished=false;r.finishTime=null;r.finishMs=0;r.startTs=null;r.offset=0;});
  document.getElementById('master-display').textContent='00:00:00';
  document.getElementById('master-display').className='master-time';
  document.getElementById('btn-start').style.display='';
  document.getElementById('btn-start').textContent='Iniciar largada';
  document.getElementById('btn-pause').style.display='none';
  renderAll();
}
function tick() {
  masterMs=Date.now()-masterStartTs;
  document.getElementById('master-display').textContent=fmt(masterMs);
  runners.forEach(r=>{
    if(r.running&&!r.finished){r.elapsed=Date.now()-r.startTs;
      const el=document.getElementById('rt-'+r.id);if(el)el.textContent=fmt(r.elapsed);}
  });
  updateSmallStats();
}
function updateSmallStats() {
  document.getElementById('s-running').textContent=runners.filter(r=>r.running&&!r.finished).length+' en carrera';
  document.getElementById('s-finished').textContent=runners.filter(r=>r.finished).length+' finalizados';
}
function finishRunner(id) {
  const r=runners.find(x=>x.id===id);if(!r||r.finished)return;
  if(r.running)r.elapsed=Date.now()-r.startTs;
  r.running=false;r.finished=true;r.finishMs=r.elapsed;r.finishTime=fmt(r.elapsed);
  renderCards();renderStats();updateSmallStats();
  if(activeTab==='clasificacion')renderPodium();
}
function resetRunner(id) {
  const r=runners.find(x=>x.id===id);if(!r)return;
  r.elapsed=0;r.running=false;r.finished=false;r.finishTime=null;r.finishMs=0;r.startTs=null;r.offset=0;
  if(masterRunning){r.running=true;r.startTs=Date.now();}
  renderCards();renderStats();updateSmallStats();
  if(activeTab==='clasificacion')renderPodium();
}
function finishAll() {
  runners.forEach(r=>{if(!r.finished){if(r.running)r.elapsed=Date.now()-r.startTs;r.running=false;r.finished=true;r.finishMs=r.elapsed;r.finishTime=fmt(r.elapsed);}});
  renderCards();renderStats();updateSmallStats();
  if(activeTab==='clasificacion')renderPodium();
}

function setFilter(f,btn) {
  catFilter=f;
  document.querySelectorAll('#cat-filters .filter-btn').forEach(b=>{b.classList.remove('active');b.style.cssText='';});
  btn.classList.add('active');
  if(f!=='all'&&CATS[f]){btn.style.background=CATS[f].bg;btn.style.color=CATS[f].accent;btn.style.borderColor=CATS[f].border;}
  else{btn.style.background='#1A1A1A';btn.style.color='#fff';btn.style.borderColor='#444';}
  renderCards();
}
function setDistFilter(f,btn) {
  distFilter=f;
  document.querySelectorAll('#dist-filters .filter-btn').forEach(b=>{b.classList.remove('active');b.style.cssText='';});
  btn.classList.add('active');
  if(f!=='all'&&DISTS[f]){btn.style.background=DISTS[f].color;btn.style.color='#fff';btn.style.borderColor=DISTS[f].color;}
  else{btn.style.background='#1A1A1A';btn.style.color='#fff';btn.style.borderColor='#444';}
  renderCards();
}
function setPodFilter(type,val,btn) {
  if(type==='dist'){
    podDistFilter=val;
    document.querySelectorAll('.podium-filters button[data-pdist]').forEach(b=>{b.style.background='';b.style.color='';b.style.fontWeight='';});
  } else {
    podCatFilter=val;
    document.querySelectorAll('.podium-filters button[data-pcat]').forEach(b=>{b.style.background='';b.style.color='';b.style.fontWeight='';});
  }
  if(btn){btn.style.background='#CC0000';btn.style.color='#fff';btn.style.borderColor='#CC0000';}
  renderPodium();
}

function renderFilters() {
  const cats=[...new Set(runners.map(r=>r.categoria))].sort();
  const dists=[...new Set(runners.map(r=>r.distancia))].sort((a,b)=>parseInt(a)-parseInt(b));

  const cf=document.getElementById('cat-filters');
  cf.innerHTML=`<button class="filter-btn" style="background:#1A1A1A;color:#fff;border-color:#444" onclick="setFilter('all',this)">Todas (${runners.length})</button>`;
  cats.forEach(cat=>{
    const c=CATS[cat]||{bg:'#111',border:'#333',accent:'#888'};
    const cnt=runners.filter(r=>r.categoria===cat).length;
    cf.innerHTML+=`<button class="filter-btn" onclick="setFilter('${cat}',this)" style="border-color:${c.border};color:${c.accent};background:${c.bg}">
      <span class="dot" style="background:${c.border}"></span>${cat} (${cnt})</button>`;
  });

  const df=document.getElementById('dist-filters');
  df.innerHTML=`<button class="filter-btn" style="background:#1A1A1A;color:#fff;border-color:#444" onclick="setDistFilter('all',this)">Todas</button>`;
  dists.forEach(d=>{
    const c=DISTS[d]||{color:'#888',text:'#aaa',border:'#333'};
    const cnt=runners.filter(r=>r.distancia===d).length;
    df.innerHTML+=`<button class="filter-btn" onclick="setDistFilter('${d}',this)" style="border-color:${c.color};color:${c.text};background:rgba(0,0,0,0.4)">
      <span class="dot" style="background:${c.color}"></span>${d} (${cnt})</button>`;
  });
}

function renderStats() {
  const finished=runners.filter(r=>r.finished).length;
  const running=runners.filter(r=>r.running&&!r.finished).length;
  const pending=runners.filter(r=>!r.running&&!r.finished).length;
  const distStats=['2K','6K','11K'].map(d=>{
    const total=runners.filter(r=>r.distancia===d).length;
    const fin=runners.filter(r=>r.distancia===d&&r.finished).length;
    if(!total)return'';
    const c=DISTS[d];
    return `<div class="stat-card" style="border-color:${c.border}"><div class="stat-label" style="color:${c.color}">${d}</div><div class="stat-val" style="color:${c.text};font-size:20px">${fin}<span style="font-size:12px;color:#333">/${total}</span></div></div>`;
  }).join('');
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-val">${runners.length}</div></div>
    <div class="stat-card" style="border-color:#1a3a1a"><div class="stat-label" style="color:#2ecc71">Meta</div><div class="stat-val" style="color:#2ecc71">${finished}</div></div>
    <div class="stat-card" style="border-color:#3a0000"><div class="stat-label" style="color:#CC0000">Corriendo</div><div class="stat-val" style="color:#CC0000">${running}</div></div>
    <div class="stat-card"><div class="stat-label">Pendientes</div><div class="stat-val" style="color:#333">${pending}</div></div>
    ${distStats}`;
}

function renderCards() {
  const grid=document.getElementById('runners-grid');
  const search=document.getElementById('search').value.toLowerCase();
  let list=runners;
  if(catFilter!=='all')list=list.filter(r=>r.categoria===catFilter);
  if(distFilter!=='all')list=list.filter(r=>r.distancia===distFilter);
  if(search)list=list.filter(r=>(r.nombres+' '+r.apellidos).toLowerCase().includes(search)||r.id.toLowerCase().includes(search));
  list=[...list].sort((a,b)=>{
    if(a.finished!==b.finished)return a.finished?1:-1;
    if(a.running!==b.running)return a.running?-1:1;
    return a.elapsed-b.elapsed;
  });
  if(!list.length){grid.innerHTML='<div class="empty-msg">Sin corredores con ese filtro</div>';return;}

  grid.innerHTML=list.map(r=>{
    const cat=r.finished?{bg:'#0A1A0A',border:'#2ecc71',accent:'#2ecc71',time:'#2ecc71'}:(CATS[r.categoria]||{bg:'#111',border:'#333',accent:'#888',time:'#333'});
    const dist=DISTS[r.distancia]||{color:'#888',text:'#aaa',border:'#333'};
    const isRunning=r.running&&!r.finished;
    const cardBorder=r.finished?'#1a4a1a':(isRunning?cat.border:'#1A1A1A');
    const dot=isRunning?`<span class="running-dot"></span>`:'';

    return `<div class="runner-card" style="border-color:${cardBorder}">
      <div class="card-header" style="background:${cat.bg}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div class="runner-id" style="color:${cat.accent}">${r.id}</div>
          <span class="dist-badge" style="border-color:${dist.border};color:${dist.text};background:rgba(0,0,0,0.4)">${r.distancia}</span>
        </div>
        <div class="runner-name">${dot}${r.nombres} ${r.apellidos}</div>
        <div class="runner-cat" style="color:${cat.accent}">${r.categoria}</div>
        <div class="runner-meta">
          <span>${r.genero==='F'||r.genero==='Femenino'?'Femenino':'Masculino'}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="runner-time ${r.finished?'finished':(!r.running?'pending':'')}" id="rt-${r.id}" style="color:${r.finished?'#2ecc71':(isRunning?cat.time:'#252525')}">${fmt(r.elapsed)}</div>
        ${r.finished?`<div class="finish-mark">Finalizado — ${r.finishTime}</div>`:''}
        <div class="runner-actions">
          ${!r.finished?`<button class="btn-go" onclick="finishRunner('${r.id}')" ${!masterRunning&&!r.running?'disabled':''}>Marcar meta</button>`:''}
          <button class="btn-ghost" onclick="resetRunner('${r.id}')" style="padding:7px 12px">Reiniciar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderPodium() {
  const pcf=document.getElementById('pod-cat-filters');
  const cats=[...new Set(runners.filter(r=>r.finished).map(r=>r.categoria))].sort();
  pcf.innerHTML=`<button class="filter-btn" data-pcat="all" onclick="setPodFilter('cat','all',this)" style="background:#1A1A1A;color:#fff;border-color:#444">Todas las categorias</button>`;
  cats.forEach(cat=>{
    const c=CATS[cat]||{bg:'#111',border:'#333',accent:'#888'};
    pcf.innerHTML+=`<button class="filter-btn" data-pcat="${cat}" onclick="setPodFilter('cat','${cat}',this)" style="border-color:${c.border};color:${c.accent};background:${c.bg}">
      <span class="dot" style="background:${c.border}"></span>${cat}</button>`;
  });

  let finished=runners.filter(r=>r.finished);
  if(podDistFilter!=='all')finished=finished.filter(r=>r.distancia===podDistFilter);
  if(podCatFilter!=='all')finished=finished.filter(r=>r.categoria===podCatFilter);
  finished=[...finished].sort((a,b)=>a.finishMs-b.finishMs);

  const sec=document.getElementById('podium-section');
  if(!finished.length){sec.innerHTML='<div class="podium-empty">Aun no hay corredores en meta</div>';return;}

  const distGroups = podDistFilter!=='all'
    ? [podDistFilter]
    : [...new Set(finished.map(r=>r.distancia))].sort((a,b)=>parseInt(a)-parseInt(b));

  sec.innerHTML=distGroups.map(dist=>{
    const catGroups = podCatFilter!=='all'
      ? [podCatFilter]
      : [...new Set(finished.filter(r=>r.distancia===dist).map(r=>r.categoria))].sort();

    const distC=DISTS[dist]||{color:'#888',text:'#aaa'};
    const grouped=catGroups.map(cat=>{
      const group=finished.filter(r=>r.distancia===dist&&r.categoria===cat);
      if(!group.length)return'';
      const catC=CATS[cat]||{border:'#333',accent:'#888'};
      const rows=group.map((r,i)=>{
        const pos=i+1;
        const posClass=pos===1?'pos-1':pos===2?'pos-2':pos===3?'pos-3':'pos-rest';
        const posLabel=pos===1?'1':pos===2?'2':pos===3?'3':String(pos);
        const isTop=pos<=3;
        return `<tr class="${isTop?'pod-row-top':''}">
          <td><div class="pos-num ${posClass}">${posLabel}</div></td>
          <td>
            <div class="pod-name">${r.nombres} ${r.apellidos}</div>
            <div class="pod-id">${r.id}</div>
          </td>
          <td><div class="pod-cat" style="color:${catC.accent}"><span class="cat-stripe" style="background:${catC.border}"></span>${cat}</div></td>
          <td><div class="pod-time ${pos===1?'best':''}">${r.finishTime}</div></td>
        </tr>`;
      }).join('');
      return `<div class="podium-group">
        <div class="podium-group-title" style="color:${catC.accent}">${dist} · ${cat} — ${group.length} finalista${group.length!==1?'s':''}</div>
        <table class="podium-table">
          <thead><tr>
            <th style="width:40px">Pos</th>
            <th>Corredor</th>
            <th>Categoria</th>
            <th>Tiempo</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join('');

    return `<div style="margin-bottom:8px">
      <div class="section-title" style="color:${distC.text};border-left-color:${distC.color}">${dist} — Resultados por categoria</div>
      ${grouped||'<div class="podium-empty">Sin finalistas en esta categoria</div>'}
    </div>`;
  }).join('');
}

function renderAll(){renderFilters();renderStats();renderCards();updateSmallStats();}
renderAll();
</script>
